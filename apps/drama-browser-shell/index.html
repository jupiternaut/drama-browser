<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%2308090b"/><path d="M18 17h17c8 0 13 5 13 14v2c0 9-5 14-13 14H18V17zm10 9v12h7c3 0 5-2 5-6s-2-6-5-6h-7z" fill="%23f8fafc"/></svg>' />
    <title>Drama Browser Shell</title>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        background: #07080b;
        color: rgba(248, 250, 252, 0.94);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .drama-critical-fallback {
        display: grid;
        min-height: 100vh;
        place-items: center;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.025), transparent),
          #07080b;
        padding: 24px;
      }

      .drama-critical-card {
        display: grid;
        width: min(560px, 100%);
        grid-template-columns: 42px minmax(0, 1fr);
        gap: 14px;
        border: 1px solid rgba(255, 255, 255, 0.11);
        border-radius: 10px;
        background: rgba(12, 13, 17, 0.94);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
        padding: 18px;
      }

      .drama-critical-mark {
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        font-size: 13px;
        font-weight: 800;
      }

      .drama-critical-copy {
        min-width: 0;
      }

      .drama-critical-kicker {
        margin: 0;
        color: rgba(226, 232, 240, 0.44);
        font: 700 10px/1.4 ui-monospace, SFMono-Regular, Consolas, monospace;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .drama-critical-card h1 {
        margin: 4px 0 0;
        font-size: 16px;
        line-height: 1.35;
      }

      .drama-critical-card p:not(.drama-critical-kicker) {
        margin: 8px 0 0;
        color: rgba(226, 232, 240, 0.62);
        font-size: 13px;
        line-height: 1.65;
      }

      .drama-critical-button {
        height: 30px;
        margin-top: 14px;
        border: 1px solid rgba(143, 184, 255, 0.32);
        border-radius: 6px;
        background: rgba(143, 184, 255, 0.14);
        color: rgba(248, 250, 252, 0.94);
        cursor: pointer;
        padding: 0 12px;
        font: 700 12px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
